# Values for devsecops-app - Full Stack Application

replicaCount: 1

# Backend image - Jenkins will update this tag
backend:
  image:
    repository: rahuldock44/backend
    pullPolicy: Always
    tag: "latest"
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Frontend image - Jenkins will update this tag
frontend:
  image:
    repository: rahuldock44/frontend
    pullPolicy: Always
    tag: "latest"
  service:
    type: NodePort
    port: 80
    nodePort: 30007
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# MongoDB - stable, no CI updates needed
mongodb:
  image:
    repository: mongo
    pullPolicy: IfNotPresent
    tag: "6.0"
  service:
    type: ClusterIP
    port: 27017
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

ingress:
  enabled: false

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
