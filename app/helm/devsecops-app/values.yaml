# Values for devsecops-app - Node.js Application

replicaCount: 1

image:
  repository: rahuldevops121/devsecops-app   # ← your DockerHub image
  pullPolicy: Always                          # ← always pull latest
  tag: "1"                                    # ← Jenkins will update this automatically

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 3000              # ← your Node.js app port

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: devsecops-app.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /
    port: http

readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}
