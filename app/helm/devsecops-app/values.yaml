replicaCount: 1

backend:
  image:
    repository: rahuldock44/backend
    pullPolicy: Always
    tag: "8"
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

frontend:
  image:
    repository: rahuldock44/frontend
    pullPolicy: Always
    tag: "8"
  service:
    type: NodePort
    port: 80
    nodePort: 30007
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

mongodb:
  image:
    repository: mongo
    pullPolicy: IfNotPresent
    tag: "6.0"
  service:
    type: ClusterIP
    port: 27017
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

serviceAccount:
  create: false

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
